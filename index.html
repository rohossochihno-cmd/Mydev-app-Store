<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYDEV App Store | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        body { font-family: 'Google Sans', sans-serif; background-color: #ffffff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-item.active { color: #01875f !important; font-variation-settings: 'FILL' 1; }
        .top-tab.active { color: #01875f; border-bottom: 2px solid #01875f; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .app-card:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-40 bg-white p-4">
        <div class="flex items-center gap-3 bg-[#f1f3f4] px-4 py-2 rounded-full shadow-sm border border-transparent focus-within:bg-white focus-within:border-gray-200 transition-all">
            <span class="material-symbols-outlined text-gray-500">search</span>
            <input type="text" id="searchInput" onkeyup="searchApps()" placeholder="Search apps & games" class="bg-transparent flex-1 outline-none text-sm py-1">
        </div>
    </header>

    <div class="flex gap-6 px-5 border-b border-gray-100 overflow-x-auto no-scrollbar py-2 text-sm font-medium text-gray-500 bg-white sticky top-[72px] z-30">
        <button onclick="switchTab('for-you', this)" class="top-tab active pb-2 whitespace-nowrap">For you</button>
        <button onclick="switchTab('top-charts', this)" class="top-tab pb-2 whitespace-nowrap">Top charts</button>
        <button onclick="switchTab('mod-apks', this)" class="top-tab pb-2 whitespace-nowrap">Mod APKs</button>
    </div>

    <main class="p-4">
        <div class="w-full flex justify-center py-2 mb-6 bg-gray-50 rounded-xl overflow-hidden border">
            <script type="text/javascript">
                atOptions = { 'key' : 'fdddf6b1380b5b1e6bf49417ec357c13', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/fdddf6b1380b5b1e6bf49417ec357c13/invoke.js"></script>
        </div>

        <div id="for-you" class="tab-content active space-y-6">
            <h2 class="text-lg font-bold">Recommended for you</h2>
            <div class="grid grid-cols-3 gap-4" id="app-grid">
                </div>
        </div>

        <div id="top-charts" class="tab-content">
            <h2 class="text-lg font-bold mb-4">Top Free Apps</h2>
            <div id="top-charts-list" class="space-y-4">
                </div>
        </div>

        <div id="mod-apks" class="tab-content">
            <h2 class="text-lg font-bold mb-4">Premium Mod APKs</h2>
            <div class="grid grid-cols-3 gap-4" id="mod-grid">
                </div>
        </div>
    </main>

    <div id="details-page" class="fixed inset-0 z-50 bg-white hidden overflow-y-auto p-5">
        <button onclick="closeDetails()" class="material-symbols-outlined mb-6 p-2 bg-gray-100 rounded-full">arrow_back</button>
        <div class="flex gap-5">
            <img id="det-icon" class="w-24 h-24 rounded-2xl shadow-md border">
            <div class="flex-1">
                <h1 id="det-title" class="text-2xl font-bold text-gray-800"></h1>
                <p class="text-[#01875f] font-bold text-sm">MYDEV STUDIO</p>
                <p id="det-size" class="text-sm text-gray-500 mt-1"></p>
            </div>
        </div>
        
        <div class="flex justify-between mt-8 border-y py-4 text-center">
            <div><p class="font-bold">4.8★</p><p class="text-[10px] text-gray-500">Reviews</p></div>
            <div><p class="font-bold">50k+</p><p class="text-[10px] text-gray-500">Downloads</p></div>
            <div><p class="font-bold">3+</p><p class="text-[10px] text-gray-500">Rated</p></div>
        </div>

        <button id="downloadBtn" class="w-full bg-[#01875f] text-white py-3 rounded-lg mt-8 font-bold text-lg active:scale-95 transition">Install</button>
        
        <div class="mt-8">
            <h3 class="font-bold text-lg mb-2">About this app</h3>
            <p id="det-desc" class="text-sm text-gray-600 leading-relaxed"></p>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 z-40">
        <button onclick="switchBottomNav(this)" class="nav-item active flex flex-col items-center">
            <span class="material-symbols-outlined">games</span>
            <span class="text-[10px]">Games</span>
        </button>
        <button onclick="switchBottomNav(this)" class="nav-item flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">apps</span>
            <span class="text-[10px]">Apps</span>
        </button>
        <button onclick="switchBottomNav(this)" class="nav-item flex flex-col items-center text-gray-400">
            <span class="material-symbols-outlined">local_offer</span>
            <span class="text-[10px]">Offers</span>
        </button>
    </nav>

    <script>
        // --- 🚀 EKANE APP UPLOAD KORUN (Manual Data) ---
        const appsData = [
            {
                name: "OneTime Mail",
                icon: "https://cdn-icons-png.flaticon.com/512/281/281769.png",
                size: "4.2 MB",
                desc: "Get instant temporary email addresses for your privacy and security. Best for OTP and Spam protection.",
                link: "https://example.com/onetime.apk",
                category: "for-you"
            },
            {
                name: "Spotify Mod",
                icon: "https://cdn-icons-png.flaticon.com/512/5968/5968764.png",
                size: "35 MB",
                desc: "Listen to your favorite music without any ads. Premium features unlocked for everyone.",
                link: "https://example.com/spotify.apk",
                category: "mod"
            },
            {
                name: "YT Prompt Maker",
                icon: "https://cdn-icons-png.flaticon.com/512/174/174883.png",
                size: "2.1 MB",
                desc: "The ultimate AI tool for YouTubers to generate viral scripts and descriptions.",
                link: "https://example.com/prompt.apk",
                category: "for-you"
            }
        ];

        // Apps load korar function
        function loadApps() {
            const grid = document.getElementById('app-grid');
            const modGrid = document.getElementById('mod-grid');
            grid.innerHTML = ""; 
            modGrid.innerHTML = "";

            appsData.forEach(app => {
                const card = `
                    <div class="app-card cursor-pointer" onclick="showDetails('${app.name}', '${app.icon}', '${app.size}', '${app.desc}', '${app.link}')">
                        <div class="aspect-square bg-gray-50 rounded-2xl p-4 border border-gray-100 shadow-sm">
                            <img src="${app.icon}" class="w-full h-full object-contain">
                        </div>
                        <p class="text-[11px] mt-2 font-medium truncate">${app.name}</p>
                        <p class="text-[9px] text-gray-400">${app.size}</p>
                    </div>
                `;
                if(app.category === "mod") modGrid.innerHTML += card;
                else grid.innerHTML += card;
            });
        }

        // Details Logic
        function showDetails(name, icon, size, desc, link) {
            document.getElementById('det-title').innerText = name;
            document.getElementById('det-icon').src = icon;
            document.getElementById('det-size').innerText = size;
            document.getElementById('det-desc').innerText = desc;
            
            document.getElementById('downloadBtn').onclick = () => window.open(link, "_blank");
            
            document.getElementById('details-page').classList.remove('hidden');
        }

        function closeDetails() { document.getElementById('details-page').classList.add('hidden'); }

        // Tab Switching
        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.top-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function switchBottomNav(btn) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active', 'text-gray-400'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.add('text-gray-400'));
            btn.classList.add('active');
            btn.classList.remove('text-gray-400');
        }

        function searchApps() {
            let q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.app-card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(q) ? "block" : "none";
            });
        }

        // Init
        window.onload = loadApps;
    </script>
</body>
</html>
